function sFraisType(){
  return card("Type de frais ?",null,renderOpts(FRAIS_TYPES.map(function(f){
    return{icon:f.icon,label:f.label,desc:f.note,badge:f.max!=null?"Max "+f.max+"€":"Sans plafond",cb:function(){
      pushH(f.icon,"Frais",f.label);
      set({buildingSeg:{fraisType:f.id,fraisMax:f.max},step:"frais_montant"});
    }};
  })));
}

function sFraisMontant(){
  var frais=FRAIS_TYPES.find(function(f){return f.id===S.buildingSeg.fraisType;});
  var wrap=div("input-row");

  // Déterminer le plafond total et le libellé
  var multiplier=1;
  var maxTotal=frais.max; // null = sans plafond
  var multiplyNote="";
  if(frais.max==null){
    multiplyNote=" (sans plafond fixe — remboursement du surcoût sur justificatif)";
  }else if(frais.unit==="voyageur"||frais.unit==="passager"){
    multiplier=Math.max(1,S.nbPass);
    maxTotal=frais.max*Math.max(1,S.nbPass);
    multiplyNote=" (plafond : "+frais.max+"€/voyageur × "+Math.max(1,S.nbPass)+" = "+maxTotal+"€ max au total)";
  }

  wrap.appendChild(div("step-sub",frais.label+" - Montant TOTAL (€) :"+multiplyNote));
  var i=inp("number","0");i.min=0;if(maxTotal!=null){i.max=maxTotal;}i.step="0.01";
  wrap.appendChild(i);
  var btn=document.createElement("button");btn.className="btn-confirm";btn.textContent="Ajouter →";
  btn.onclick=function(){
    var rawInput=parseFloat(i.value)||0;
    var finalAmt=maxTotal!=null?Math.min(rawInput,maxTotal):rawInput;
    var nbp=Math.max(1,S.nbPass);
    S.fraisList.push({type:frais.id,montant:rawInput,finalAmt:finalAmt,maxPerPerson:frais.max,nbPassUsed:nbp,unit:frais.unit});
    pushH(frais.icon,frais.label,finalAmt.toFixed(2)+"€ (total)");
    set({step:"frais_suite"});
  };
  wrap.appendChild(btn);
  return card("Montant justifié",null,wrap);
}

function sFraisSuite(){
  return card("Ajouter un autre frais ?",null,renderOpts([
    {icon:"<i data-lucide='plus'></i>",label:"Oui, ajouter",cb:function(){set({buildingSeg:{},step:"frais_type"});}},
    {icon:"<i data-lucide='check-circle-2'></i>",label:"Terminé",cb:function(){set({step:"result_frais"});}},
  ]));
}

function sResultFrais(){
  // Récupérer le résultat du retard (indemnité)
  var segments=S.segments;
  var indemniteRetard=0;
  var isBilletDirectOUIGO=isBilletDirectOUIGOTGV(segments);
  var allDetailsRetard=[];

  segments.forEach(function(seg,idx){
    if(!seg.elig)return;

    var isOUIGOSegment=seg.carrier==="ouigo";
    var ri;
    var displayAmt="";
    var amt=0;

    if(isBilletDirectOUIGO){
      // Appliquer la même logique que sResultRetard() pour le split proactif/complément
      var effectiveDelayForRate=S.delay;
      if(isOUIGOSegment && S.ouigoDelay){
        effectiveDelayForRate=S.ouigoDelay;
      }
      var bdRate=getBilletDirectRate(seg.carrier,effectiveDelayForRate);
      ri={rate:bdRate,fix:null};
    }else{
      ri=getRateInfo(seg.carrier,seg.tarif,S.delay);
    }

    var tarifObj=getTarifObj(seg.tarif);
    var mode=tarifObj.mode;

    if(seg.tarif==="prime_tiers_seul"){
      amt=getRBADAmount(S.delay);
      displayAmt=amt>0?amt+"€ (Tiers - BAD)":"Pas d'indemnisation (< 30 min)";
      mode="BAD";
    }else if(seg.tarif==="prime_titulaire"){
      var pt=getPointsInfo(S.delay);
      if(pt){displayAmt=pt.points+" points de fidélité";}
      else{displayAmt="Aucune indemnisation";}
      amt=0;
    }else if(seg.tarif==="prime_fid_tiers"){
      var pt=getPointsInfo(S.delay);
      displayAmt=(pt?pt.points+" pts (FID)":"0 pts")+" + "+getRBADAmount(S.delay)+"€ BAD";
      amt=getRBADAmount(S.delay);
    }else if(seg.tarif==="prime_gvt_tiers"){
      var badAmt=getRBADAmount(S.delay);
      amt=badAmt*2;
      displayAmt=badAmt+"€ (GVT) + "+badAmt+"€ (Tiers) BAD";
      mode="BAD";
    }else if(seg.tarif==="prime_gvt_transitoire"){
      amt=getRBADAmount(S.delay);
      displayAmt=amt>0?amt+"€ (GVT Transitoire - BAD)":"Pas d'indemnisation (< 30 min)";
      mode="BAD";
    }else if(S.delay<60){
      mode="BAD";
      amt=segAmt(seg.price,seg.tarif,ri);
      displayAmt=amt.toFixed(2)+" € (BAD)";
    }else if(seg.tarif==="max_loisirs"){
      amt=segAmt(seg.price,seg.tarif,ri);
      displayAmt=amt.toFixed(2)+" € (BAD fixe)";
    }else{
      // Split proactif/complément pour Billet Direct OUIGO
      if(isBilletDirectOUIGO && isOUIGOSegment && S.ouigoDelay && S.ouigoDelay<S.delay){
        var ouigoRate=getBilletDirectRate("ouigo",S.ouigoDelay);
        var finalRate=getBilletDirectRate("ouigo",S.delay);
        var proactiveAmt=(seg.price*(ouigoRate/100));
        var complementAmt=(seg.price*(finalRate/100))-proactiveAmt;
        var complementRate=finalRate-ouigoRate;
        amt=complementAmt;
        displayAmt="Proactif ("+ouigoRate+"%): "+proactiveAmt.toFixed(2)+"€ | Complément CARE ("+complementRate+"%): "+complementAmt.toFixed(2)+"€";
      }else if(isBilletDirectOUIGO && isOUIGOSegment && S.ouigoDelay && S.ouigoDelay>=S.delay){
        // OUIGO a déjà compensé autant ou plus — CARE ne verse rien sur ce segment
        amt=0;
        displayAmt="Déjà compensé par OUIGO (retard OUIGO >= retard final)";
        mode="BAD";
      }else{
        amt=segAmt(seg.price,seg.tarif,ri);
        displayAmt=amt.toFixed(2)+" € (VB ou BAD)";
      }
      mode="VB ou BAD";
    }

    indemniteRetard+=amt;
    allDetailsRetard.push({carrier:getCarrierLabel(seg.carrier),tarif:tarifObj.label,price:seg.price,rate:ri.rate,amt:amt,displayAmt:displayAmt,mode:mode});
  });

  if(S.exceptionalIndemnity){
    indemniteRetard+=S.exceptionalIndemnity.amount;
    var exSeg=segments.find(function(s){return s.id===S.exceptionalIndemnity.segmentId;});
    if(exSeg){
      var exFinalAmt=exSeg.price*(S.exceptionalIndemnity.rate/100);
      allDetailsRetard.push({
        carrier:getCarrierLabel(exSeg.carrier)+" (COMPLÉMENT)",
        tarif:"Indemnisation exceptionnelle",
        price:exSeg.price,
        rate:S.exceptionalIndemnity.rate,
        amt:S.exceptionalIndemnity.amount,
        mode:"Indemnisation exceptionnelle",
        displayAmt:"Complément : "+S.exceptionalIndemnity.amount.toFixed(2)+"€ (pour atteindre "+exFinalAmt.toFixed(2)+"€, soit "+S.exceptionalIndemnity.rate+"%)"
      });
    }
  }

  // Calculer les frais
  var totalFrais=0;
  var fraisDetails=[];

  S.fraisList.forEach(function(f){
    var fraisType=FRAIS_TYPES.find(function(ft){return ft.id===f.type;});
    var finalAmt=f.finalAmt!==undefined?f.finalAmt:f.montant;
    totalFrais+=finalAmt;
    fraisDetails.push({type:fraisType,finalAmt:finalAmt,montant:f.montant,maxPerPerson:f.maxPerPerson,nbPassUsed:f.nbPassUsed,unit:f.unit});
  });

  // Total combiné
  var totalGlobal=indemniteRetard+totalFrais;

  var c=div("result-card");
  var h=div("result-header");
  // RT : si dossier retard+frais → RT du retard ; si frais seuls (sans segments) → RT 2064
  var rtCodeFrais=segments.length>0?getRTCode_retard(segments):"2064";
  h.innerHTML="<div class='result-mode'>Indemnisation complète</div><div class='result-amount'>"+totalGlobal.toFixed(2)+"</div><div class='result-label'>€ TTC</div><div class='rt-badge'>RT\u00a0"+rtCodeFrais+"</div>";
  c.appendChild(h);

  // Indemnité retard
  if(indemniteRetard>0){
    var indemnBreakdown=div("result-breakdown");
    indemnBreakdown.appendChild(div("breakdown-title","<i data-lucide='train'></i>Indemnité retard"));
    allDetailsRetard.forEach(function(d){
      var item=div("breakdown-item");

    // Grouper les segments identiques (carrier + montant + mode)
    var segmentGroups = {};
    copyDetails.forEach(function(d){
      var amountStr = d.mode.includes("Points")
        ? d.amt.toFixed(0)  // Points: entier sans €
        : d.amt.toFixed(2) + "€";  // Euros avec symbole
      var key = d.carrier + ": " + amountStr + " " + d.mode;
      segmentGroups[key] = (segmentGroups[key] || 0) + 1;
    });

    // Afficher les segments groupés: "OUIGO: 6.25€ x4" ou "TGV INOUI: 30.00€ X4"
    for(var key in segmentGroups){
      var count = segmentGroups[key];
      if(count > 1){
        txt += " " + key + " x" + count;
      }else{
        txt += " " + key;

    }

    if(totalFrais > 0 || fraisDetails.length > 0) {
      var fraisComposition = [];
      fraisDetails.forEach(function(fd){
        var unit = fd.type.unit === "voyageur" || fd.type.unit === "passager" ? "×" + S.nbPass : "";

          ? (fd.finalAmt / S.nbPass).toFixed(2)
          : fd.finalAmt.toFixed(2);

      });
      txt += " § Frais éligible " + totalFrais.toFixed(2) + "€ (" + fraisComposition.join(" + ") + ")";
    }

  var btn=document.createElement("button");btn.className="act-btn secondary";btn.innerHTML="<i data-lucide='home'></i> Nouveau";btn.onclick=confirmReset;
  acts.appendChild(btn);
  c.appendChild(acts);
  return c;
}

function isWeekendOrHoliday(date){
  // Retourne true si la date est un samedi (6), dimanche (0), ou jour férié FR
  var dayOfWeek=date.getDay();
  if(dayOfWeek===0||dayOfWeek===6)return true;

  // Jours fériés fixes en France
  var month=date.getMonth()+1;
  var day=date.getDate();
  if((month===1&&day===1)||(month===5&&day===1)||(month===5&&day===8)||(month===7&&day===14)||(month===8&&day===15)||(month===11&&day===1)||(month===11&&day===11)||(month===12&&day===25)){
    return true;
  }
  return false;
}

function calcRetractionDeadline(dateSignatureStr){
  // Date signature en YYYY-MM-DD
  // Rétraction: 14 jours calendaires à compter du LENDEMAIN de la signature
  var dSig=new Date(dateSignatureStr);
  var dSigTime=new Date(dSig.getFullYear(),dSig.getMonth(),dSig.getDate());

  // Lendemain de la signature
  var dStart=new Date(dSigTime);
  dStart.setDate(dStart.getDate()+1);

  // +14 jours
  var dDeadline=new Date(dStart);
  dDeadline.setDate(dDeadline.getDate()+14);

  // Extension: si samedi/dimanche/jour férié, prolonger jusqu'au jour ouvrable suivant
  while(isWeekendOrHoliday(dDeadline)){
    dDeadline.setDate(dDeadline.getDate()+1);
  }

  return dDeadline;
}

function normalizeMaxActifDate(dateStr){
  // Pour Max Actif/Actif+: l'abonnement débute le 1er du mois suivant la souscription
  var d=new Date(dateStr);
  return new Date(d.getFullYear(),d.getMonth()+1,1);
}

function calcResiliationDate(abonnement,dateActivationStr,dateDemandeStr){
  var dAct=new Date(dateActivationStr);
  var dDem=new Date(dateDemandeStr);

  if(abonnement==="max_jeune"||abonnement==="max_senior"){
    // Pour Max Jeune/Senior: anniversaire (même jour du mois) + préavis 5 jours
    var nextAnniversary=new Date(dDem.getFullYear(),dDem.getMonth(),dAct.getDate());
    var dayOfAnniversary=dAct.getDate();
    var cutoffDay=dayOfAnniversary-5; // 5 jours avant l'anniversaire

    // Si l'anniversaire du mois courant est passé OU si demande moins de 5 jours avant
    if(nextAnniversary<dDem || dDem.getDate()>cutoffDay){
      // Passer au mois suivant
      nextAnniversary=new Date(dDem.getFullYear(),dDem.getMonth()+1,dAct.getDate());
    }

    return nextAnniversary;
  }else{
    // Max Actif/Actif+: 1er du mois suivant (avec préavis 5 jours)
    var d=dDem;
    var year=d.getFullYear();
    var month=d.getMonth();
    var lastDay=new Date(year,month+1,0).getDate();
    var cutoffDay=lastDay-5;
    if(d.getDate()<=cutoffDay){
      return new Date(year,month+1,1);
    }else{
      return new Date(year,month+2,1);
    }
  }
}

function calcResiliationFees(abonnement,dateActivationStr,dateDemandeStr){
  var dateActForCalc=dateActivationStr;

  // Max Actif/Actif+: normaliser au 1er du mois suivant (1ère facture le 01)
  if(abonnement==="max_actif"||abonnement==="max_actif_plus"){
    var d=new Date(dateActivationStr);
    var normalized=new Date(d.getFullYear(),d.getMonth()+1,1);
    dateActForCalc=normalized.getFullYear()+"-"+String(normalized.getMonth()+1).padStart(2,"0")+"-"+String(normalized.getDate()).padStart(2,"0");
  }

  var dAct=new Date(dateActForCalc);
  var dDem=new Date(dateDemandeStr);

  // Calculer la date d'effet pour pouvoir déterminer l'ancienneté réelle
  var dateEffective=calcResiliationDate(abonnement,dateActivationStr,dateDemandeStr);

  // Calculer les mois écoulés jusqu'à la date d'effet (pas jusqu'à la demande)
  var monthsDiff=(dateEffective.getFullYear()-dAct.getFullYear())*12+(dateEffective.getMonth()-dAct.getMonth());
  // Réduire de 1 si le jour du mois n'a pas encore été atteint
  if(dateEffective.getDate()<dAct.getDate())monthsDiff--;
  monthsDiff=Math.max(0,monthsDiff);

  var result={abonnement:abonnement,mois:monthsDiff,frais:0,gratuit:false,message:""};

  if(abonnement==="max_actif"||abonnement==="max_actif_plus"){
    var montantMensuel=S.resiliationData?.montantMensuel||0;
    if(monthsDiff<12){
      result.frais=montantMensuel;
      result.message="Période d'engagement 12 mois : frais de résiliation = 1 mensualité ("+montantMensuel.toFixed(2)+"€)";
    }else{
      result.gratuit=true;
      result.message="Au-delà de 12 mois : résiliation sans frais";
    }
  }else if(abonnement==="max_jeune"||abonnement==="max_senior"){
    if(monthsDiff<3){
      result.message="Période d'engagement 3 mois : résiliation impossible avant 3 mois";
      result.impossible=true;
    }else if(monthsDiff<12){
      result.frais=15;
      result.message="Entre 3 et 12 mois : frais de dossier 15€";
    }else{
      result.gratuit=true;
      result.message="Au-delà de 12 mois : résiliation gratuite (frais de dossier offerts)";
    }
  }
  return result;
}

function dateToFr(dateStr){
  // Convertir YYYY-MM-DD en JJ/MM/AAAA
  var parts=dateStr.split("-");
  return parts[2]+"/"+parts[1]+"/"+parts[0];
}

function sResultResiliation(){
  var data=S.resiliationData||{};
  var calc=calcResiliationFees(data.type,data.dateActivation,data.dateResiliation);
  var effectiveDate=calcResiliationDate(data.type,data.dateActivation,data.dateResiliation);

  // Pour Max Actif/Actif+, afficher la vrai date d'activation (01 du mois suivant)
  var displayActivationDate=data.dateActivation;
  if(data.type==="max_actif"||data.type==="max_actif_plus"){
    var d=new Date(data.dateActivation);
    var normalized=new Date(d.getFullYear(),d.getMonth()+1,1);
    displayActivationDate=normalized.getFullYear()+"-"+String(normalized.getMonth()+1).padStart(2,"0")+"-"+String(normalized.getDate()).padStart(2,"0");
  }

  var c=div("result-card");
  var header=div("result-header");
  header.appendChild(div("result-mode","RÉSILIATION ABONNEMENT"));
  if(calc.impossible){
    header.appendChild(div("result-amount","✕ Non résiliable"));
    header.appendChild(div("result-label",calc.message));
  }else{
    header.appendChild(div("result-amount",calc.frais+"€"));
    header.appendChild(div("result-label","Frais de résiliation"));
  }
  c.appendChild(header);

  if(!calc.impossible){
    var bd=div("result-breakdown");
    bd.appendChild(div("breakdown-title","<i data-lucide='info'></i> DÉTAILS"));
    var typeLabel=data.type||"";typeLabel=typeLabel.replace(/_/g," ").toUpperCase();
    var effectiveDateStr=effectiveDate.getDate().toString().padStart(2,"0")+"/"+(String(effectiveDate.getMonth()+1).padStart(2,"0"))+"/"+effectiveDate.getFullYear();
    var items=[
      {label:"Abonnement",val:typeLabel},
      {label:"Date saisie",val:dateToFr(data.dateActivation)},
      {label:"1ère facturation",val:dateToFr(displayActivationDate)},
      {label:"Date demande",val:dateToFr(data.dateResiliation)},
      {label:"Ancienneté",val:calc.mois+" mois"},
      {label:"Frais",val:(calc.gratuit?"Gratuit":""+calc.frais.toFixed(2)+"€")},
      {label:"Date d'effet",val:effectiveDateStr}
    ];
    for(var i=0;i<items.length;i++){
      var item=div("breakdown-item");
      item.appendChild(div("breakdown-label",items[i].label));
      item.appendChild(div("breakdown-value",items[i].val));
      bd.appendChild(item);
    }
    var msgItem=div("breakdown-item");
    msgItem.appendChild(div("breakdown-label","Explication"));
    msgItem.appendChild(div("breakdown-value",calc.message));
    bd.appendChild(msgItem);
    c.appendChild(bd);
  }

  var acts=div("action-row");
  var btnCopy=document.createElement("button");
  btnCopy.className="act-btn primary";
  btnCopy.innerHTML="<i data-lucide='copy'></i> Copier";
  btnCopy.onclick=function(){
    var typeLabel=data.type||"";typeLabel=typeLabel.replace(/_/g," ").toUpperCase();
    var txt="RÉSILIATION ABONNEMENT "+typeLabel+"\n";
    txt+="Date activation: "+data.dateActivation+"\n";
    txt+="Date demande: "+data.dateResiliation+"\n";
    txt+="Ancienneté: "+calc.mois+" mois\n";
    txt+="Frais: "+(calc.gratuit?"Gratuit":calc.frais.toFixed(2)+"€")+"\n";
    txt+="Date d'effet: "+effectiveDate.toLocaleDateString("fr-FR")+"\n\n"+calc.message;
    navigator.clipboard.writeText(txt);
    btnCopy.innerHTML="<i data-lucide='check'></i> Copié!";
    setTimeout(function(){btnCopy.innerHTML="<i data-lucide='copy'></i> Copier";},2000);
  };
  acts.appendChild(btnCopy);
  var btnNouv=document.createElement("button");
  btnNouv.className="act-btn secondary";
  btnNouv.innerHTML="<i data-lucide='home'></i> Accueil";
  btnNouv.onclick=confirmReset;
  acts.appendChild(btnNouv);
  c.appendChild(acts);
  return c;
}

      var item=S.history[histIdx];
      var hi=div("hist-item");
      var ic=div("hist-icon",item.icon||"<i data-lucide='message-circle'></i>");
      var cn=div("hist-content");
      cn.appendChild(div("hist-q",item.q));
      cn.appendChild(div("hist-a",item.a));
      var eb=document.createElement("button");
      eb.className="hist-edit";eb.title="Modifier";eb.innerHTML="<i data-lucide='pencil'></i>";
      (function(idx){eb.onclick=function(){editHistAt(idx);};})(histIdx);
      hi.appendChild(ic);hi.appendChild(cn);hi.appendChild(eb);
      hist.appendChild(hi);
    }
    app.appendChild(hist);
  }

  // Barre de progression
  if(S.step!=="menu"){
    var pct=STEP_PROGRESS[S.step]||0;
    var pt=div("progress-track");
    var pf=div("progress-fill");
    pf.style.width=(pct*100)+"%";
    pt.appendChild(pf);
    app.appendChild(pt);
  }

  var content;
  switch(S.step){
    case"menu":content=sMenu();break;
    case"nb_pass":content=sNbPass();break;
    case"nb_pass_input":content=sNbPassInput();break;
    case"delay":content=sDelay();break;
    case"carrier":content=sCarrier();break;
    case"ouigo_retard_segment":content=sOUIGORetardSegment();break;
    case"tarif_identique":content=sTarifIdentique();break;
    case"tarif_unique":content=sTarifUnique();break;
    case"price_unique":content=sPriceUnique();break;
    case"exceptional_indemnity":content=sExceptionalIndemnity();break;
    case"tarif_passenger":content=sTarifPassenger(S.currentPassenger);break;
    case"prime_deposant_passenger":content=sPrimeDeposant(S.currentPassenger);break;
    case"prime_deposant_unique":content=sPrimeDeposantUnique();break;
    case"price_passenger":content=sPricePassenger(S.currentPassenger);break;
    case"ter_zou_selection":content=sTerZouSelection();break;
    case"add_segment":content=sAddSegmentOrCalculate();break;
    case"tarif":content=sTarif();break;
    case"price":content=sPrice();break;
    case"result_retard":content=sResultRetard();break;
    case"frais_type":content=sFraisType();break;
    case"frais_montant":content=sFraisMontant();break;
    case"frais_suite":content=sFraisSuite();break;
    case"result_frais":content=sResultFrais();break;
    case"dates_type":content=sDatesType();break;
    case"retraction":content=sRetraction();break;
    case"result_retraction":content=sResultRetraction();break;
    case"resiliation":content=sResiliation();break;
    case"result_resiliation":content=sResultResiliation();break;
    case"bareme":content=sBareme();break;
    case"dossier_history":content=sDossierHistory();break;
    default:content=sMenu();
  }
  app.appendChild(content);

  // Touche Entrée → clic sur le premier .btn-confirm visible
  app.querySelectorAll("input[type='number'],input[type='text'],input[type='date'],input.time-input").forEach(function(inp){
    inp.addEventListener("keydown",function(e){
      if(e.key==="Enter"){
        e.preventDefault();
        var btn=app.querySelector(".btn-confirm");
        if(btn)btn.click();
      }
    });
  });

  app.appendChild(div("footer","TGVCare Assistant • BD30/G30 • Calcul de conformité SNCF • v1.7.3"));

  if(window.lucide&&typeof lucide.createIcons==="function"){
    try{lucide.createIcons();}catch(e){}
  }

  setTimeout(function(){
    var cards=document.querySelectorAll(".step-card");
    var target=cards[cards.length-1];
    if(target){
      var y=target.getBoundingClientRect().top+window.pageYOffset-24;
      window.scrollTo({top:Math.max(0,y),behavior:"smooth"});
    }
    setupSpotlight();
  },50);
}

function setupSpotlight(){
  var spotlightSelectors=[".btn-confirm",".btn-back",".opt",".icon-btn",".act-btn"];
  var spotlightElements=document.querySelectorAll(spotlightSelectors.join(","));

  spotlightElements.forEach(function(el){
    if(!el.classList.contains("hover-spotlight")){
      el.classList.add("hover-spotlight");
    }

    el.addEventListener("mousemove",function(e){
      var rect=el.getBoundingClientRect();
      var x=e.clientX-rect.left;
      var y=e.clientY-rect.top;

      el.style.setProperty("--x",x+"px");
      el.style.setProperty("--y",y+"px");
    },false);

    el.addEventListener("mouseleave",function(){
      el.style.setProperty("--x","50%");
      el.style.setProperty("--y","50%");
    },false);
  });
}

if(localStorage.getItem("bd30-theme")==="dark")S.dark=true;
render();
</script>

<script>
/* ─────────────────────────────────────────────────────────────────────────────
   PREMIUM MOTION SYSTEM
   1  Cursor glow      · GPU-tracked radial halo
   2  Card parallax    · Per-card 3D tilt on hover (±1.8°)
   3  Magnetic CTA     · Subtle attraction on btn-confirm / act-btn.primary
   4  Number counter   · result-amount counts up on reveal
   5  Stagger reveal   · .opt and .breakdown-item stagger in
   6  Step transition  · 95ms exit fade before render(), enter via CSS
   7  Progress shimmer · Animated gradient on progress-fill
   ───────────────────────────────────────────────────────────────────────── */
(function () {
  'use strict';

  /* Respect user preference globally */
  var rmq = window.matchMedia('(prefers-reduced-motion: reduce)');
  function noMotion() { return rmq.matches; }

  /* Easing — mirrors CSS token */
  function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

  /* ── 1. Cursor glow ──────────────────────────────────────────────────── */
  var gEl = document.createElement('div');
  gEl.id = 'pm-glow';
  document.body.appendChild(gEl);

  var mx = window.innerWidth * 0.5, my = window.innerHeight * 0.5;
  var gx = mx, gy = my;

  document.addEventListener('mousemove', function (e) {
    mx = e.clientX; my = e.clientY;
  }, { passive: true });
  document.addEventListener('mouseleave', function () { gEl.style.opacity = '0'; });
  document.addEventListener('mouseenter', function () { gEl.style.opacity = '1'; });

  (function glowLoop() {
    if (!noMotion()) {
      gx += (mx - gx) * 0.075;
      gy += (my - gy) * 0.075;
      gEl.style.transform =
        'translate3d(calc(' + gx + 'px - 50%), calc(' + gy + 'px - 50%), 0)';
    }
    requestAnimationFrame(glowLoop);
  })();

  /* ── 2. Card parallax (event delegation — per card) ─────────────────── */
  document.addEventListener('mouseover', function (e) {
    if (noMotion()) return;
    var card = e.target.closest && e.target.closest('.step-card, .result-card');
    if (!card || card._prl) return;
    card._prl = true;

    card.addEventListener('mousemove', function (ev) {
      var r  = card.getBoundingClientRect();
      var nx = (ev.clientX - r.left - r.width  * 0.5) / (r.width  * 0.5);
      var ny = (ev.clientY - r.top  - r.height * 0.5) / (r.height * 0.5);
      card.style.transition = 'transform 0.1s ease, box-shadow 0.2s ease';
      card.style.transform  =
        'perspective(1000px)' +
        ' rotateX(' + (-ny * 1.8) + 'deg)' +
        ' rotateY(' + (nx  * 1.8) + 'deg)' +
        ' translateY(-3px) translateZ(5px)';
    }, { passive: true });

    card.addEventListener('mouseleave', function () {
      card.style.transition = 'transform 0.52s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s ease';
      card.style.transform  = '';
    });
  }, { passive: true });

  /* ── 3. Magnetic buttons ─────────────────────────────────────────────── */
  function magnetize(el) {
    if (el._mag || noMotion()) return;
    el._mag = true;

    el.addEventListener('mousemove', function (e) {
      var r  = el.getBoundingClientRect();
      var dx = (e.clientX - r.left - r.width  * 0.5) * 0.2;
      var dy = (e.clientY - r.top  - r.height * 0.5) * 0.2;
      el.style.transition = 'transform 0.1s ease';
      el.style.transform  = 'translate3d(' + dx + 'px,' + dy + 'px,0) scale(1.02)';
    }, { passive: true });

    el.addEventListener('mouseleave', function () {
      el.style.transition = 'transform 0.45s cubic-bezier(0.16,1,0.3,1)';
      el.style.transform  = '';
    });

    el.addEventListener('mousedown', function () {
      el.style.transition = 'transform 0.08s ease';
      el.style.transform  = 'scale(0.96)';
    });
    el.addEventListener('mouseup', function () {
      el.style.transition = 'transform 0.32s cubic-bezier(0.16,1,0.3,1)';
      el.style.transform  = '';
    });
  }

  /* ── 4. Number counter ───────────────────────────────────────────────── */
  function countUp(el, to, ms) {
    if (noMotion()) return;
    var raw    = el.textContent.trim();
    var m      = raw.match(/^([\d\s,.]+)/);
    if (!m) return;
    var suffix = raw.slice(m[0].length);
    var dec    = raw.indexOf('.') >= 0 ? 2 : 0;
    var t0     = null;
    el.dataset.pmCount = '1';
    (function frame(ts) {
      if (!t0) t0 = ts;
      var p = Math.min((ts - t0) / ms, 1);
      el.textContent = (to * easeOutQuart(p)).toFixed(dec) + suffix;
      if (p < 1) requestAnimationFrame(frame);
    })(performance.now());
  }

  /* ── 5. Stagger reveal ───────────────────────────────────────────────── */
  function runStagger() {
    var idx = 0;
    document.querySelectorAll('.opt, .breakdown-item').forEach(function (el) {
      if (el._sg) return;
      el._sg = true;
      if (!noMotion()) {
        el.classList.add('pm-sg');
        var delay = 30 + idx * 52;
        setTimeout(function () { el.classList.add('pm-in'); }, delay);
      }
      idx++;
    });
  }

  /* ── 6. Post-render hook (stagger + magnetic + counter + shimmer) ─────── */
  function afterRender() {
    /* Reset per-element flags so freshly rendered elements animate */
    document.querySelectorAll('.opt, .breakdown-item').forEach(function (el) {
      el._sg = false;
    });
    document.querySelectorAll('.step-card, .result-card').forEach(function (c) {
      c._prl = false;
    });

    runStagger();

    document.querySelectorAll('.btn-confirm, .act-btn.primary').forEach(magnetize);

    /* Count up result amounts */
    document.querySelectorAll('.result-amount').forEach(function (el) {
      if (el.dataset.pmCount) return;
      var raw = el.textContent.trim();
      var m   = raw.match(/^([\d,.\s]+)/);
      if (!m) return;
      var val = parseFloat(m[0].replace(/[^\d.]/g, ''));
      if (!isNaN(val) && val > 0) countUp(el, val, 820);
    });

    /* Progress bar shimmer */
    var pf = document.querySelector('.progress-fill');
    if (pf && !pf._shimmer) {
      pf._shimmer = true;
      pf.style.background     = 'linear-gradient(90deg, var(--prune) 0%, #D94FAF 43%, rgba(255,255,255,0.28) 50%, var(--prune-dk) 57%, var(--prune) 100%)';
      pf.style.backgroundSize = '200% 100%';
      pf.style.animationName            = 'pm-shimmer';
      pf.style.animationDuration        = '2.2s';
      pf.style.animationTimingFunction  = 'linear';
      pf.style.animationIterationCount  = 'infinite';
    }
  }

  /* ── 7. Patch render() — exit → original → afterRender ──────────────── */
  var _orig  = window.render;
  var _busy  = false;
  var _queue = null;

  window.render = function () {
    var _args = arguments;

    /* If we're mid-transition, queue this call and return */
    if (_busy) { _queue = _args; return; }

    var app  = document.getElementById('app');
    var kids = app
      ? Array.from(app.children).filter(function (el) {
          return !el.classList.contains('hdr');
        })
      : [];

    /* First render or reduced-motion: skip exit animation */
    if (!app || kids.length === 0 || noMotion()) {
      _orig.apply(window, _args);
      setTimeout(afterRender, 55);
      return;
    }

    _busy = true;

    /* Exit — 95ms fade + upward nudge on content (not header) */
    kids.forEach(function (el) {
      el.style.transition = 'opacity 0.09s ease, transform 0.09s ease';
      el.style.opacity    = '0';
      el.style.transform  = 'translateY(-5px)';
    });

    setTimeout(function () {
      _busy = false;
      _orig.apply(window, _args);       /* renders new content with pm-enter CSS */
      setTimeout(afterRender, 40);

      /* Flush any queued render */
      if (_queue) { var q = _queue; _queue = null; window.render.apply(window, q); }
    }, 95);
  };

  /* ── Boot: run hooks on the already-rendered initial state ──────────── */
  setTimeout(afterRender, 110);

})();
</script>
